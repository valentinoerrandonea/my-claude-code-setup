# ─────────────────────────────────────────────────────────────
#  Ghostty Configuration - Claude Code Power Setup
# ─────────────────────────────────────────────────────────────

# ── Font ─────────────────────────────────────────────────────
font-family = Menlo
font-size = 14
font-thicken = true
adjust-cell-height = 6

# ── Theme ────────────────────────────────────────────────────
# Custom palette: near-black corners, steel blue center, warm peach accent, cool white
# (derived from wallpaper — modify to taste, or use a built-in: ghostty +list-themes)
background = #0d1018
foreground = #c5d0dd
cursor-color = #5e8eb8
selection-background = #1e2e44
selection-foreground = #c5d0dd

# Normal (0–7)
palette = 0=#141820
palette = 1=#b87272
palette = 2=#72a072
palette = 3=#c09270
palette = 4=#4e7fa6
palette = 5=#8878b0
palette = 6=#5aa0b8
palette = 7=#c5d0dd

# Bright (8–15)
palette = 8=#263040
palette = 9=#d08890
palette = 10=#88b888
palette = 11=#d4b090
palette = 12=#6898cc
palette = 13=#a090cc
palette = 14=#88b8cc
palette = 15=#e0eaf4

# ── Window ───────────────────────────────────────────────────
window-padding-x = 14
window-padding-y = 10
window-padding-balance = true
window-padding-color = extend
window-decoration = auto
window-theme = ghostty
window-colorspace = display-p3
window-width = 120
window-height = 36
window-inherit-working-directory = true
window-inherit-font-size = true
window-new-tab-position = end
window-show-tab-bar = auto
window-subtitle = working-directory

# ── Background ───────────────────────────────────────────────
background-opacity = 0.92
background-blur = true

# ── Cursor ───────────────────────────────────────────────────
cursor-style = bar
cursor-style-blink = false
cursor-click-to-move = true

# ── Mouse ────────────────────────────────────────────────────
mouse-hide-while-typing = true
focus-follows-mouse = true
mouse-scroll-multiplier = 1.5
link-url = true

# ── Clipboard ────────────────────────────────────────────────
copy-on-select = true
clipboard-read = allow
clipboard-write = allow
clipboard-trim-trailing-spaces = true
clipboard-paste-protection = true
clipboard-paste-bracketed-safe = true

# ── Scrollback ───────────────────────────────────────────────
scrollback-limit = 10000000

# ── Splits ───────────────────────────────────────────────────
unfocused-split-opacity = 0.85

# ── Shell Integration ────────────────────────────────────────
shell-integration = detect
shell-integration-features = cursor,sudo,title

# ── Quick Terminal (dropdown) ────────────────────────────────
quick-terminal-position = top
quick-terminal-size = 40%
quick-terminal-animation-duration = 0.12
quick-terminal-autohide = true

# ── Misc ─────────────────────────────────────────────────────
confirm-close-surface = true
quit-after-last-window-closed = false
resize-overlay = after-first
resize-overlay-duration = 750ms
minimum-contrast = 1.1

# ── macOS: Option as Alt (required for tmux keybindings) ─────
macos-option-as-alt = true

# ── Keybindings ──────────────────────────────────────────────
# Splits (Ghostty native)
keybind = cmd+d=new_split:right
keybind = cmd+shift+d=new_split:down
keybind = cmd+alt+left=goto_split:left
keybind = cmd+alt+right=goto_split:right
keybind = cmd+alt+up=goto_split:top
keybind = cmd+alt+down=goto_split:bottom
keybind = cmd+shift+enter=toggle_split_zoom

# Tabs
keybind = cmd+t=new_tab
keybind = cmd+w=close_surface
keybind = cmd+shift+left=previous_tab
keybind = cmd+shift+right=next_tab

# Font size
keybind = cmd+equal=increase_font_size:1
keybind = cmd+minus=decrease_font_size:1
keybind = cmd+zero=reset_font_size

# Navigation
keybind = cmd+shift+up=scroll_to_top
keybind = cmd+shift+down=scroll_to_bottom
keybind = page_up=scroll_page_up
keybind = page_down=scroll_page_down

# Quick terminal
keybind = global:cmd+grave_accent=toggle_quick_terminal

# ── tmux Integration (sends Ctrl+A prefix + key to tmux) ────
# Cmd+N         → New Claude Code panel (horizontal split + tiled)
# Cmd+Shift+N   → New Claude Code panel (vertical split + tiled)
# Cmd+Shift+=   → Redistribute panels equally (tiled layout)
# Cmd+Ctrl+R    → Rename current panel title
# Cmd+Ctrl+G    → (reserved for future use)
keybind = cmd+n=text:\x01n
keybind = cmd+shift+n=text:\x01N
keybind = cmd+shift+equal=text:\x01=
keybind = cmd+ctrl+r=text:\x01t
keybind = cmd+ctrl+g=text:\x01g

# Misc
keybind = cmd+shift+comma=reload_config
keybind = cmd+k=clear_screen
keybind = cmd+shift+i=inspector:toggle
