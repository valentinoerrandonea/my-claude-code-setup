# ─────────────────────────────────────────────────────────────
#  tmux Configuration - Claude Code Power Setup
# ─────────────────────────────────────────────────────────────

# --- General ---
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0

# --- Theme (Tokyo Night inspired) ---

# Status bar
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#3b4261]|"
set -g status-right "#[fg=#3b4261]| #[fg=#7aa2f7]%H:%M #[fg=#3b4261]| #[fg=#a9b1d6]%d-%b-%Y "

# Window labels in status bar
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "

# Pane borders with titles
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-status top
set -g pane-border-format " #[fg=#7aa2f7,bold]#{?pane_active,▶ ,  }#[fg=#a9b1d6]#{pane_title} "

# Messages
set -g message-style "bg=#1a1b26,fg=#7aa2f7"

# --- Keybindings ---

# Prefix: Ctrl+A (more comfortable than Ctrl+B)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with Option+Ctrl+arrows (no prefix needed)
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

# Resize panes with Ctrl+arrows
bind -n C-Left resize-pane -L 2
bind -n C-Right resize-pane -R 2
bind -n C-Up resize-pane -U 2
bind -n C-Down resize-pane -D 2

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Claude Code: Spawn new instances ---
# prefix + n → new Claude Code pane (horizontal split + auto-tiled)
# prefix + N → new Claude Code pane (vertical split + auto-tiled)
# prefix + = → redistribute all panes equally
# prefix + t → rename current pane title
unbind n
bind n split-window -h "zsh -l" \; send-keys "claude --dangerously-skip-permissions" Enter \; select-layout tiled
bind N split-window -v "zsh -l" \; send-keys "claude --dangerously-skip-permissions" Enter \; select-layout tiled

# Rename current pane
unbind t
bind t command-prompt -p "Panel title:" "select-pane -T '%%'"

# --- Plugins (via TPM) ---

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Copy/paste to system clipboard with mouse
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'

# Better mouse support: scroll in less/man, right-click menu
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @scroll-without-changing-pane 'on'
set -g @scroll-speed-num-lines-per-scroll '3'
set -g @emulate-scroll-for-no-mouse-alternate-buffer 'on'

# Save and restore sessions (persist across restarts)
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-save sessions every 15 min
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'off'

# Open files/URLs from tmux with mouse/keyboard
set -g @plugin 'tmux-plugins/tmux-open'

# Initialize TPM (MUST be the last line)
run '~/.tmux/plugins/tpm/tpm'
